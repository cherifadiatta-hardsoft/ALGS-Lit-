<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#141824" />
      <stop offset="100%" stop-color="#0c0d12" />
    </radialGradient>

    <!-- Green Pin Arc Gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="50%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Orange Pointer Gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular background for high-fidelity launcher icon -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="4" />

  <!-- Abstract Road Map Lines in background -->
  <path d="M 120 340 L 220 280 L 320 340 L 400 280" fill="none" stroke="#334155" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" />
  <path d="M 220 280 L 220 400" fill="none" stroke="#334155" stroke-width="12" stroke-linecap="round" opacity="0.6" />

  <!-- Map marker grouping -->
  <g transform="translate(0, -20)" filter="url(#glow)">
    <!-- Outer Arc Leaf (Green) -->
    <path d="M 256 100 C 330 100 390 160 390 234 C 390 274 372 312 342 338 L 290 290 C 304 278 312 260 312 234 C 312 203 287 178 256 178 C 225 178 200 203 200 234 C 200 260 208 278 222 290 L 170 338 C 140 312 122 274 122 234 C 122 160 182 100 256 100 Z" fill="url(#greenGrad)" />

    <!-- Orange Bottom Pointer Leaf (Orange) -->
    <path d="M 256 400 L 170 338 L 222 290 C 232 298 244 302 256 302 C 268 302 280 298 290 290 L 342 338 Z" fill="url(#orangeGrad)" />

    <!-- Pure White Center Target Pin -->
    <circle cx="256" cy="234" r="34" fill="#FFFFFF" />
    <circle cx="256" cy="234" r="14" fill="#0c0d12" />
  </g>

  <!-- Styled Logo Text below icon -->
  <text x="256" y="445" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="44" font-weight="900" text-anchor="middle" letter-spacing="4">
    <tspan fill="#FFFFFF">ALG</tspan><tspan fill="#F97316">S</tspan>
  </text>
</svg>
